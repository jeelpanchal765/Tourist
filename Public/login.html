<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TouristGuide India</title>
  <meta name="description" content="Sign in to your TouristGuide account to save your favorite places and plan your next trip.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    // ✅ Firebase Config - Tourist App
    const firebaseConfig = {
      apiKey: "AIzaSyBpuhTJYbAdM8uyH_GQ6N5sVqy7YUigITo",
      authDomain: "tourist-app-c9cbc.firebaseapp.com",
      projectId: "tourist-app-c9cbc",
      storageBucket: "tourist-app-c9cbc.firebasestorage.app",
      messagingSenderId: "438939626169",
      appId: "1:438939626169:web:778a891b268331052f8968",
      measurementId: "G-S9VT0KZJZF"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    // Make googleLogin available globally
    window.googleLogin = async function() {
      const btn = document.getElementById('btn-google-login');
      const msgEl = document.getElementById('login-message');

      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Signing in...`;
      msgEl.style.display = 'none';

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Only allow Gmail accounts
        if (!user.email.endsWith('@gmail.com')) {
          auth.signOut();
          throw new Error('Only @gmail.com accounts are allowed!');
        }

        // Save session
        sessionStorage.setItem('loggedIn', 'true');
        sessionStorage.setItem('userEmail', user.email);
        sessionStorage.setItem('userPhoto', user.photoURL || '');
        sessionStorage.setItem('userName', user.displayName || user.email);

        msgEl.className = 'login-message success';
        msgEl.textContent = `✅ Welcome ${user.displayName || user.email}! Redirecting...`;
        msgEl.style.display = 'block';

        setTimeout(() => { window.location.href = 'index.html'; }, 1500);

      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google`;

        msgEl.className = 'login-message error';
        if (err.code === 'auth/popup-closed-by-user') {
          msgEl.textContent = '❌ Popup closed. Please try again.';
        } else if (err.message.includes('@gmail.com')) {
          msgEl.textContent = '❌ Only @gmail.com accounts are allowed!';
        } else if (err.code === 'auth/unauthorized-domain') {
          msgEl.textContent = '⚠️ Domain not authorized. Add localhost to Firebase Console.';
        } else {
          msgEl.textContent = '❌ Google Sign-In failed. Check Firebase config.';
        }
        msgEl.style.display = 'block';
      }
    };
  </script>
</head>

<body>

  <!-- Background Orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo" id="nav-logo-login">
      <div class="nav-logo-icon">✈️</div>
      <span class="nav-logo-text">TouristGuide</span>
    </a>
  </nav>

  <!-- Login Card -->
  <main class="login-container">
    <div class="login-card" id="login-card">

      <!-- Card Header -->
      <div class="login-header">
        <div class="login-icon">🔐</div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to continue your journey</p>
      </div>

      <!-- Social Login -->
      <div class="social-login">
        <button class="btn-social" id="btn-google-login" type="button" onclick="googleLogin()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
      </div>

      <div class="divider">
        <span>or sign in with email</span>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">

        <div class="form-group" id="fg-email">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input
              type="text"
              id="email"
              name="email"
              placeholder="yourname@gmail.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <div class="form-group" id="fg-password">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔑</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="btn-toggle-pass" id="btn-toggle-password" onclick="togglePassword()" title="Show/hide password">👁️</button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label" id="remember-label">
            <input type="checkbox" id="remember" name="remember">
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
        </div>

        <button class="btn-login" type="submit" id="btn-submit-login">
          <span class="btn-text">Sign In</span>
          <span class="btn-arrow">→</span>
        </button>

        <div id="login-message" class="login-message" style="display:none;"></div>

      </form>

      <!-- Sign Up Link -->
      <p class="signup-prompt">
        Don't have an account?
        <a href="#" class="signup-link" id="signup-link" onclick="showSignupAlert()">Create one free</a>
      </p>

    </div>
  </main>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit-login');
      const msgEl = document.getElementById('login-message');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Gmail only validation
      if (!email.endsWith('@gmail.com')) {
        msgEl.className = 'login-message error';
        msgEl.textContent = '❌ Only @gmail.com email is allowed!';
        msgEl.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        msgEl.className = 'login-message error';
        msgEl.textContent = '❌ Password must be at least 6 characters!';
        msgEl.style.display = 'block';
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      msgEl.style.display = 'none';

      // Simulated auth
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.disabled = false;

        msgEl.className = 'login-message success';
        msgEl.textContent = '✅ Login successful! Redirecting...';
        msgEl.style.display = 'block';

        // Save login state
        sessionStorage.setItem('loggedIn', 'true');
        sessionStorage.setItem('userEmail', email);

        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      }, 1200);
    }

    function showSignupAlert() {
      const msg = document.getElementById('login-message');
      msg.className = 'login-message info';
      msg.textContent = '📝 Sign up feature coming soon!';
      msg.style.display = 'block';
    }
  </script>

</body>
</html>
